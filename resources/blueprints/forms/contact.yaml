title: Contact
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: name
            field:
              type: text
              display: Name
              validate:
                - required
          -
            handle: email
            field:
              type: text
              input_type: email
              display: Email Address
              validate:
                - required
                - email
          -
            handle: phone
            field:
              type: text
              input_type: tel
              display: Phone Number
          -
            handle: interest
            field:
              type: select
              display: What are you interested in?
              options:
                'Join email list': 'Join our email list'
                'Attend a meeting': 'Attend a meeting'
                'Volunteer': 'Volunteer / Get involved'
                'Join a precinct team': 'Join a precinct team'
                'Leadership opportunities': 'Leadership opportunities'
                'Training and workshops': 'Training and workshops'
                'ACD book club signup': 'ACD book club signup'
                'Candidate support': 'Candidate support'
                'General questions': 'General questions'
              placeholder: 'Choose one'
          -
            handle: message
            field:
              type: textarea
              display: Message
              validate:
                - required
          -
            handle: admin_reviewed
            field:
              type: toggle
              display: Admin Reviewed
              default: false
