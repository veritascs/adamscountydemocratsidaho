title: 'News & Events Page'
tabs:
  main:
    display: Main
    sections:
      -
        fields:
          -
            handle: title
            field:
              type: text
              display: Title
              required: true
              validate:
                - required
          -
            handle: content
            field:
              type: markdown
              display: 'Intro Content'
          -
            handle: page_links_heading
            field:
              type: text
              display: 'External Links Heading'
          -
            handle: page_links
            field:
              type: grid
              display: 'External Resource Links'
              add_row: 'Add Link'
              instructions: 'Links to external news sources shown at the top of the page.'
              fields:
                -
                  handle: label
                  field:
                    type: text
                    display: Label
                    required: true
                -
                  handle: url
                  field:
                    type: text
                    display: URL
          -
            handle: template
            field:
              type: template
              display: Template
              localizable: true
  sidebar:
    display: Sidebar
    sections:
      -
        fields:
          -
            handle: slug
            field:
              type: slug
              localizable: true
              validate: 'max:200'
          -
            handle: parent
            field:
              type: entries
              collections:
                - pages
              max_items: 1
              listable: false
              localizable: true
