title: Contact
honeypot: website
store: true
email:
  -
    to: mbechdel@gmail.com
    subject: New Adams County Democrats contact form submission
fields:
  -
    handle: name
    field:
      type: text
      display: Name
      validate:
        - required
  -
    handle: email
    field:
      type: text
      input_type: email
      display: Email Address
      validate:
        - required
        - email
  -
    handle: phone
    field:
      type: text
      input_type: tel
      display: Phone Number
  -
    handle: interest
    field:
      type: select
      display: What are you interested in?
      options:
        Attend a meeting: Attend a meeting
        Volunteer: Volunteer
        Stay informed: Stay informed
        Candidate support: Candidate support
        General questions: General questions
      placeholder: Choose one
  -
    handle: message
    field:
      type: textarea
      display: Message
      validate:
        - required